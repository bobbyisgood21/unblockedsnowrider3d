<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobby's Game Hub</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #ffffff; 
            text-align: center; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 204, 0.4);
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.15);
            width: 80%;
            max-width: 500px;
        }

        h1 { 
            font-size: 50px; 
            margin: 0 0 10px 0;
            background: linear-gradient(to bottom, #fff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #8b949e; font-size: 18px; margin-bottom: 30px; }

        .play-button {
            background: #00ffcc;
            color: #0b0e14;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: 800;
            border-radius: 15px;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .play-button:hover {
            transform: scale(1.05);
            background: #fff;
        }

        .status-badge {
            margin-top: 40px;
            font-size: 12px;
            letter-spacing: 2px;
            color: #00ffcc;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SNOW RIDER 3D</h1>
        <p>UNBLOCKED PORTAL</p>
        
        <a href="https://itsvijaysingh.github.io/Snow-Rider3D/" 
           target="_blank" class="play-button">PLAY NOW</a>

        <div class="status-badge">
             Verified Developer: Bobby
        </div>
    </div>

</body>
</html>
