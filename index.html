<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games Portal</title>
    <style>
        /* Modern Dark Theme */
        body { 
            background: radial-gradient(circle at top, #1a1c2c 0%, #07080c 100%);
            color: #00ffcc; 
            text-align: center; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            min-height: 100vh;
        }

        header {
            padding: 20px 0;
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 42px; 
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #00ffcc, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.5));
        }

        /* The Game Frame Container */
        .game-container {
            position: relative;
            display: inline-block;
            width: 90%;
            max-width: 1000px;
            background: #000;
            border: 2px solid #00ffcc;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);
            aspect-ratio: 16 / 9; /* Keeps the game box shaped correctly */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Status Indicators */
        .footer-info {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .status {
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px #00ffcc;
        }

    </style>
</head>
<body>

    <header>
        <h1>UNBLOCKED GAMES</h1>
    </header>

    <div class="game-container">
        <iframe src="https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/sk160/gjv3@main/sr3d/sr3d.xml" 
                allowfullscreen="true"></iframe>
    </div>

    <div class="footer-info">
        <div class="status"><span class="dot"></span> SERVER: ONLINE</div>
        <div class="status"><span class="dot"></span> CONNECTION: SECURE</div>
    </div>

</body>
</html>
