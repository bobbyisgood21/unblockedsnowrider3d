<!DOCTYPE html>
<html>
<head>
    <title>Bobby's Pro Game Hub</title>
    <style>
        /* This makes the whole page dark and cool */
        body { 
            background-color: #0b0e14; 
            color: #00ffcc; 
            text-align: center; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
        }

        h1 { font-size: 45px; text-shadow: 0 0 20px #00ffcc; margin-bottom: 20px; }

        /* The Game Box - Fixed sizing */
        .game-wrapper {
            display: inline-block;
            border: 5px solid #00ffcc;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.3);
        }

        /* The Dashboard - This is the part that was missing */
        .stats-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: #1a1f29;
            border: 2px solid #333;
            padding: 20px;
            border-radius: 12px;
            width: 180px;
        }

        .card h3 { margin: 0; font-size: 12px; color: #888; text-transform: uppercase; }
        .card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: #fff; }
        
        .money { color: #4ade80 !important; } /* Green for money */
        .warning { color: #f87171 !important; } /* Red for claims */

    </style>
</head>
<body>

    <h1>SNOW RIDER 3D</h1>

    <div class="game-wrapper">
        <iframe src="https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://s3.amazonaws.com/cdn.mathgames.com/snow-rider-3d/index.html" 
                width="960" height="600" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="stats-area">
        <div class="card">
            <h3>Est. Earnings</h3>
            <p class="money">$0.00</p>
        </div>
        <div class="card">
            <h3>Copyrights</h3>
            <p class="warning">0</p>
        </div>
        <div class="card">
            <h3>Hack Club Status</h3>
            <p>ACTIVE</p>
        </div>
    </div>

    <p style="margin-top: 40px; color: #555;">&copy; 2026 Bobby's Gaming Portal | Verified for Arcade</p>

</body>
</html>
